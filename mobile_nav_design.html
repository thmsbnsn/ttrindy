<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Navigation Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
    }
    
    .font-hero {
      font-family: 'Montserrat', sans-serif;
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(-100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    .menu-item {
      animation: slideIn 0.3s ease-out forwards;
    }
    
    .menu-item:nth-child(1) { animation-delay: 0.05s; }
    .menu-item:nth-child(2) { animation-delay: 0.1s; }
    .menu-item:nth-child(3) { animation-delay: 0.15s; }
    .menu-item:nth-child(4) { animation-delay: 0.2s; }
    .menu-item:nth-child(5) { animation-delay: 0.25s; }
    
    .menu-overlay {
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body class="bg-gray-100">

  <!-- Mobile Menu Overlay -->
  <div class="fixed inset-0 bg-white z-50 overflow-y-auto">
    
    <!-- Header with Logo and Close Button -->
    <div class="flex items-center justify-between p-6 border-b border-gray-200">
      <!-- Logo -->
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-lg flex items-center justify-center shadow-lg">
          <span class="text-white font-bold text-xl">TTR</span>
        </div>
        <div class="flex flex-col">
          <span class="font-hero text-lg font-extrabold text-gray-900 leading-tight tracking-tight">TOP TIER</span>
          <span class="text-xs text-gray-600 font-medium">RESTORATION</span>
        </div>
      </div>
      
      <!-- Close Button - Larger and more visible -->
      <button onclick="closeMenu()" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors active:scale-95">
        <svg class="w-7 h-7 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Navigation Links -->
    <nav class="px-6 py-8">
      <ul class="space-y-2">
        <li class="menu-item opacity-0">
          <a href="#" class="flex items-center justify-between px-4 py-4 rounded-xl hover:bg-cyan-50 transition-all group active:scale-98">
            <span class="text-lg font-semibold text-gray-900 group-hover:text-cyan-600 transition-colors">Home</span>
            <svg class="w-5 h-5 text-gray-400 group-hover:text-cyan-600 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </a>
        </li>
        
        <li class="menu-item opacity-0">
          <a href="#" class="flex items-center justify-between px-4 py-4 rounded-xl hover:bg-cyan-50 transition-all group active:scale-98">
            <span class="text-lg font-semibold text-gray-900 group-hover:text-cyan-600 transition-colors">Services</span>
            <svg class="w-5 h-5 text-gray-400 group-hover:text-cyan-600 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </a>
        </li>
        
        <li class="menu-item opacity-0">
          <a href="#" class="flex items-center justify-between px-4 py-4 rounded-xl hover:bg-cyan-50 transition-all group active:scale-98">
            <span class="text-lg font-semibold text-gray-900 group-hover:text-cyan-600 transition-colors">Gallery</span>
            <svg class="w-5 h-5 text-gray-400 group-hover:text-cyan-600 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </a>
        </li>
        
        <li class="menu-item opacity-0">
          <a href="#" class="flex items-center justify-between px-4 py-4 rounded-xl hover:bg-cyan-50 transition-all group active:scale-98">
            <span class="text-lg font-semibold text-gray-900 group-hover:text-cyan-600 transition-colors">Blog</span>
            <svg class="w-5 h-5 text-gray-400 group-hover:text-cyan-600 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </a>
        </li>
        
        <li class="menu-item opacity-0">
          <a href="#" class="flex items-center justify-between px-4 py-4 rounded-xl hover:bg-cyan-50 transition-all group active:scale-98">
            <span class="text-lg font-semibold text-gray-900 group-hover:text-cyan-600 transition-colors">About</span>
            <svg class="w-5 h-5 text-gray-400 group-hover:text-cyan-600 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </a>
        </li>
      </ul>

      <!-- CTA Buttons -->
      <div class="mt-10 space-y-4">
        <!-- Primary Emergency CTA -->
        <a href="tel:3174698504" class="block w-full bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white font-bold py-5 px-6 rounded-2xl shadow-lg hover:shadow-xl transition-all active:scale-98 text-center">
          <div class="flex items-center justify-center gap-3">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
            </svg>
            <div class="text-left">
              <div class="text-xs font-medium opacity-90">24/7 Emergency</div>
              <div class="text-base font-bold">(317) 469-8504</div>
            </div>
          </div>
        </a>

        <!-- Secondary Quote CTA -->
        <a href="#quote" class="block w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-5 px-6 rounded-2xl shadow-md hover:shadow-lg transition-all active:scale-98 text-center">
          <div class="flex items-center justify-center gap-2">
            <span class="text-lg">Get a Free Quote</span>
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </a>
      </div>

      <!-- Additional Info -->
      <div class="mt-10 pt-8 border-t border-gray-200">
        <div class="flex items-center gap-3 text-sm text-gray-600 mb-4">
          <svg class="w-5 h-5 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span class="font-medium">24/7 Emergency Service Available</span>
        </div>
        
        <div class="flex items-center gap-3 text-sm text-gray-600">
          <svg class="w-5 h-5 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span class="font-medium">Serving Greater Indianapolis</span>
        </div>

        <!-- Social Links -->
        <div class="flex items-center gap-4 mt-6">
          <a href="#" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 hover:bg-cyan-500 hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
          </a>
          <a href="#" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 hover:bg-cyan-500 hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
            </svg>
          </a>
        </div>
      </div>
    </nav>
  </div>

  <script>
    function closeMenu() {
      document.body.style.overflow = 'auto';
      alert('Menu closed!');
    }
  </script>

</body>
</html>
